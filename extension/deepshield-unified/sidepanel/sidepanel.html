<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepShield Unified</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="container">
    <h1>DeepShield News Guard</h1>

    <textarea id="newsInput" placeholder="Paste news text or URL here..."></textarea>

    <div class="actions">
      <button id="verifyBtn">Verify News</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="hint">
      Or use the floating shield button on any webpage to draw a screenshot box.
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
